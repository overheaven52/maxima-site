# Render Blueprint: Dashboard -> New -> Blueprint -> connect this repo.
# Or create a Web Service manually with the same build/start commands.

services:
  - type: web
    name: maxima-site
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      # Shown once at first Blueprint deploy; set manually if you use Web Service instead.
      - key: ADMIN_PASSWORD
        sync: false
